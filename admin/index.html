<!doctype html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mission Control — Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Unbounded:wght@500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="admin.css"></head><body><div class="noise"></div><div class="orb orb-a"></div><main class="admin section"><a class="brand" href="../"><span>Z</span> MISSION<span class="dim">CONTROL</span></a><section id="login" class="card login"><p class="eyebrow">RESTRICTED ACCESS</p><h1>Адмін<br><em>панель</em></h1><p class="muted">Увійди за email адміністратора Firebase.</p><form id="loginForm"><input id="email" type="email" placeholder="email" required><input id="password" type="password" placeholder="пароль" required><button class="button primary">Увійти ↗</button></form><p class="muted" id="loginError"></p></section><section id="control" hidden><div class="admin-head"><div><p class="eyebrow">LIVE CONTENT</p><h1>Mission <em>control</em></h1></div><button id="signOut" class="button ghost">Вийти</button></div><div class="admin-grid"><section class="card"><h2>Новина</h2><form id="newsForm"><input name="text" maxlength="140" placeholder="Напр.: відкрито Wishlist" required><button class="button primary">Опублікувати</button></form></section><section class="card"><h2>Маршрут</h2><form id="routeForm"><input name="city" placeholder="Місто (Київ)" required><input name="direction" placeholder="ТУДИ або НАЗАД" required><input name="from" placeholder="Звідки" required><input name="to" placeholder="Куди" required><input name="date" placeholder="23.08.2026" required><input name="trainNumber" placeholder="Номер поїзда" required><input name="departure" placeholder="Відправлення 08:00" required><input name="arrival" placeholder="Прибуття 12:00" required><input name="duration" placeholder="Тривалість" required><input name="transfers" placeholder="Пересадки / Прямий" required><input name="price" placeholder="Ціна, якщо відома"><label><input name="recommended" type="checkbox"> Рекомендований</label><button class="button primary">Додати маршрут</button></form></section><section class="card"><h2>Заклад</h2><form id="locationForm"><input name="name" placeholder="Назва" required><input name="category" placeholder="Кухня" required><input name="price" placeholder="Середній чек" required><input name="address" placeholder="Адреса" required><textarea name="description" placeholder="Короткий опис" required></textarea><input name="menuUrl" type="url" placeholder="Посилання на меню" required><input name="photos" placeholder="Фото: до 3 URL через кому"><button class="button primary">Додати заклад</button></form></section><section class="card"><h2>Галерея та голоси</h2><p class="muted" id="stats">Завантаження…</p><div class="admin-photos" id="adminPhotos"></div></section></div></section></main><script type="module" src="admin.js"></script></body></html>
