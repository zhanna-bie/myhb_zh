<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0813">
  <title>Mission Control — Admin CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
  <div class="admin-bg">
    <div class="admin-orb admin-orb-a"></div>
    <div class="admin-orb admin-orb-b"></div>
    <div class="admin-grid"></div>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite" aria-relevant="additions"></div>
  <div id="modal-root" class="modal-root" hidden></div>

  <section id="login-view" class="login-view">
    <a class="admin-brand" href="../"><span>Z</span> MISSION<span class="dim">CONTROL</span></a>
    <div class="login-card glass">
      <p class="eyebrow">RESTRICTED ACCESS</p>
      <h1>Admin<br><em>CMS</em></h1>
      <p class="muted">Sign in with an authorized Firebase administrator account.</p>
      <form id="loginForm" class="stack-form">
        <label>Email<input id="email" type="email" autocomplete="username" placeholder="admin@email.com" required></label>
        <label>Password<input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required></label>
        <button class="button primary" type="submit">Sign in ↗</button>
      </form>
      <p class="form-error" id="loginError" role="alert"></p>
    </div>
  </section>

  <div id="app-view" class="admin-shell" hidden>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar glass" id="sidebar" aria-label="Admin navigation">
      <a class="admin-brand compact" href="../"><span>Z</span> CMS</a>
      <nav class="sidebar-nav">
        <a href="#" data-view="dashboard" class="active" aria-current="page"><span>◆</span> Dashboard</a>
        <a href="#" data-view="gallery"><span>◫</span> Gallery</a>
        <a href="#" data-view="restaurants"><span>⌖</span> Restaurants</a>
        <a href="#" data-view="routes"><span>↠</span> Routes</a>
        <a href="#" data-view="wishlist"><span>✦</span> Wishlist</a>
        <a href="#" data-view="news"><span>📡</span> News</a>
        <a href="#" data-view="votes"><span>★</span> Votes</a>
        <a href="#" data-view="guests"><span>👥</span> Guests</a>
        <a href="#" data-view="settings"><span>⚙</span> Settings</a>
      </nav>
      <button class="button ghost logout-btn" id="logoutBtn" type="button">Logout</button>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar glass">
        <button class="icon-button" id="sidebarToggle" type="button" aria-label="Toggle menu">☰</button>
        <div class="topbar-meta">
          <p class="eyebrow">LIVE CMS</p>
          <strong>Mission Control</strong>
        </div>
        <a class="button ghost" href="../" target="_blank" rel="noreferrer">View site ↗</a>
      </header>
      <main id="view-root" class="view-root"></main>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
